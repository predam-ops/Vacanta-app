  const m = MONEDE.find((x) => x.code === currencyCode);
  return m ? amount * m.rate : amount;
};

    const saved = localStorage.getItem("vacanta_lang");

    const browser = navigator.language?.slice(0, 2);
    return TRANSLATIONS[browser] ? browser : "ro";

  const CATEGORII = getCATEGORII(t);

  const [vacanta, setVacanta] = useState(null); // null = setup not done
  const [showVacantaEdit, setShowVacantaEdit] = useState(false);

  // persist

    const s = localStorage.getItem("vacanta_data");
    if (s) {
      const d = JSON.parse(s);
      if (d.cheltuieli) setCheltuieli(d.cheltuieli);
      if (d.bugetTotal) setBugetTotal(d.bugetTotal);
      if (d.notite) setNotite(d.notite);

  }, []);
  useEffect(() => {
    localStorage.setItem("vacanta_data", JSON.stringify({ cheltuieli, bugetTotal, notite, vacanta }));
  }, [cheltuieli, bugetTotal, notite, vacanta]);
  useEffect(() => { localStorage.setItem("vacanta_lang", lang); }, [lang]);

  const totalEUR = cheltuieli.reduce((s, c) => s + toEUR(parseFloat(c.suma) || 0, c.moneda), 0);
  const ramas = bugetTotal - totalEUR;
  const progres = Math.min((totalEUR / bugetTotal) * 100, 100);

  // ── VOICE ──────────────────────────────────────────────────────────────────
  const [voiceError, setVoiceError] = useState("");

  const startVoice = useCallback(async () => {
    setVoiceError("");

    // 1. Check API support
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      setVoiceError("❌ Browser-ul nu suportă voce. Folosește Chrome.");
      return;
    }

    // 2. Request mic permission explicitly first
    try {
      await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      setVoiceError("❌ Acces microfon refuzat. Permite microfonul în Chrome.");
      return;
    }

    // 3. Start recognition
    const r = new SR();
    r.lang = t.voiceLangCode || "ro-RO";
    r.continuous = false;
    r.interimResults = false;
    r.maxAlternatives = 1;

    r.onstart = () => { setListening(true); setVoiceError(""); };

    r.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      setTranscript(transcript);
      setListening(false);
      processVoiceWithAI(transcript);
    };

    r.onerror = (e) => {
      setListening(false);
      const msgs = {
        "not-allowed": "❌ Microfon blocat. În Chrome: Setări → Confidențialitate → Microfon → Permite.",
        "no-speech": "⚠️ Nu am auzit nimic. Încearcă din nou.",
        "network": "❌ Eroare rețea. Verifică conexiunea.",
        "audio-capture": "❌ Microfon indisponibil. Verifică dacă e conectat.",
        "aborted": "⚠️ Anulat.",
      };
      setVoiceError(msgs[e.error] || `❌ Eroare: ${e.error}`);
    };

    r.onend = () => setListening(false);

    recognitionRef.current = r;
    try {
      r.start();
    } catch(e) {
      setVoiceError("❌ Nu s-a putut porni microfonul: " + e.message);
    }
  }, [t]);

  const processVoiceWithAI = async (text) => {
    setAiProcessing(true);
    try {
      const monedeList = MONEDE.map((m) => m.code).join(", ");
      const prompt = `You are an assistant for a vacation expense tracking app. Analyze the spoken text and extract ALL relevant data.
Categories: avion, cazare, masina, transport, restaurant, groceries, cafea, shopping, activitati, medic, taxe, divertisment
Currencies: ${monedeList}
Payment methods: Card, Cash, Revolut, Transfer
Today: ${today()}

Text: "${text}"

Return ONLY valid JSON (no markdown). Choose the most specific category.
For "cazare" (accommodation), extract extra fields if mentioned.
For "avion" (flight), extract flight details if mentioned.
For "masina" (car rental), extract car details if mentioned.

JSON format:
{
  "categorie": "cazare",
  "suma": 259,
  "moneda": "EUR",
  "metoda": "Card",
  "data": "${today()}",
  "descriere": "",
  "extra": {
    "oras": "Milano",
    "nume": "Hotel Giacomo",
    "tip": "hotel",
    "checkin_data": "2026-04-03",
    "checkin_ora": "15:00",
    "checkout_data": "2026-04-05",
    "checkout_ora": "",
    "adresa": "",
    "rezervat_prin": ""
  }
}
For non-cazare/avion/masina categories, omit the "extra" field entirely.
For avion extra use: { "de_la":"", "la":"", "companie":"", "nr_zbor":"", "ora_plecare":"", "terminal_plecare":"", "ora_sosire":"", "terminal_sosire":"", "bagaje":"" }
For masina extra use: { "companie":"", "pickup_data":"", "pickup_ora":"", "dropoff_data":"", "dropoff_ora":"" }`;

      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 800,
          messages: [{ role: "user", content: prompt }],
        }),
      });
      const data = await resp.json();
      const raw = data.content?.map((b) => b.text || "").join("") || "";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      // Build full item with extra if present
      const newItem = { ...emptyBase(), ...parsed, id: Date.now() + Math.random() };
      if (parsed.extra && Object.keys(parsed.extra).length > 0) {
        newItem.extra = parsed.extra;
      }
      setEditItem(newItem);
      setShowForm(true);
    } catch {
      setEditItem({ ...emptyBase(), descriere: text });
      setShowForm(true);
    }
    setAiProcessing(false);
    setTranscript("");
  };

  // ── CRUD ───────────────────────────────────────────────────────────────────
  const saveItem = (item) => {
    setCheltuieli((prev) => {
      const idx = prev.findIndex((x) => x.id === item.id);
      if (idx >= 0) { const n = [...prev]; n[idx] = item; return n; }
      return [item, ...prev];
    });
    setShowForm(false);
    setEditItem(null);
  };
  const deleteItem = (id) => setCheltuieli((prev) => prev.filter((x) => x.id !== id));

  // ── FILTER ─────────────────────────────────────────────────────────────────
  const filtered = cheltuieli.filter((c) => {
    if (filterCat !== "toate" && c.categorie !== filterCat) return false;
    if (filterPeriod.de_la && c.data < filterPeriod.de_la) return false;
    if (filterPeriod.pana_la && c.data > filterPeriod.pana_la) return false;
    return true;
  });

  const totalFiltered = filtered.reduce((s, c) => s + toEUR(parseFloat(c.suma) || 0, c.moneda), 0);

  // ── CALENDAR DATES ─────────────────────────────────────────────────────────
  const allDates = [...new Set(cheltuieli.map((c) => c.data))].sort();
  const zborDates = cheltuieli.filter((c) => c.categorie === "avion").map((c) => c.data);
  const cazareDates = cheltuieli
    .filter((c) => c.categorie === "cazare" && c.extra)
    .flatMap((c) => {
      const dates = [];
      if (c.extra.checkin_data) dates.push(c.extra.checkin_data);
      if (c.extra.checkout_data) dates.push(c.extra.checkout_data);
      return dates;
    });
  const masinaDates = cheltuieli
    .filter((c) => c.categorie === "masina" && c.extra)
    .flatMap((c) => {
      const dates = [];
      if (c.extra.pickup_data) dates.push(c.extra.pickup_data);
      if (c.extra.dropoff_data) dates.push(c.extra.dropoff_data);
      return dates;
    });

  const cheltuieliPeZi = (zi) => cheltuieli.filter((c) => c.data === zi);
  const totalPeZi = (zi) => cheltuieliPeZi(zi).reduce((s, c) => s + toEUR(parseFloat(c.suma) || 0, c.moneda), 0);

  // ── PIE DATA ───────────────────────────────────────────────────────────────
  const pieData = CATEGORII.map((cat) => {
    const total = filtered
      .filter((c) => c.categorie === cat.id)
      .reduce((s, c) => s + toEUR(parseFloat(c.suma) || 0, c.moneda), 0);
    return { name: cat.label, value: parseFloat(total.toFixed(2)), color: cat.color, icon: cat.icon };
  }).filter((d) => d.value > 0);

  const barData = CATEGORII.map((cat) => ({
    name: cat.icon + " " + cat.label.slice(0, 5),
    EUR: parseFloat(
      filtered.filter((c) => c.categorie === cat.id)
        .reduce((s, c) => s + toEUR(parseFloat(c.suma) || 0, c.moneda), 0).toFixed(2)
    ),
    fill: cat.color,
  })).filter((d) => d.EUR > 0);

  // ── RENDER ─────────────────────────────────────────────────────────────────
  if (!vacanta) {
    return (
      <LangContext.Provider value={{ lang, t, setLang, CATEGORII }}>
        <SetupVacanta onSave={(v) => { setVacanta(v); setBugetTotal(v.buget); }} />
      </LangContext.Provider>
    );
  }

  return (
    <LangContext.Provider value={{ lang, t, setLang, CATEGORII }}>
    <div style={styles.app(landscape)}>
      {/* HEADER */}
      <div style={styles.header}>
        {/* Row 1: title full width */}
        <div style={styles.headerRow1}>
          <span style={styles.logo}>✈️</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={styles.appTitle}>{vacanta.destinatie || "VacațiaApp"}</div>
            <div style={styles.appSub}>
              {vacanta.data_plecare && vacanta.data_sosire
                ? `${vacanta.data_plecare} → ${vacanta.data_sosire}`
                : vacanta.data_plecare ? vacanta.data_plecare : t.trackerSub}
            </div>
          </div>
        </div>
        {/* Row 2: controls */}
        <div style={styles.headerRow2}>
          <LangPicker lang={lang} setLang={setLang} />
          <button style={styles.iconBtn} title={t.editVacation} onClick={() => setShowVacantaEdit(true)}>✏️</button>
          <button style={styles.iconBtn} onClick={() => setLandscape(!landscape)} title={landscape ? "Portrait" : "Landscape"}>
            {landscape ? (
              <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
                <rect x="1" y="4" width="16" height="10" rx="2" stroke="#475569" strokeWidth="1.8" fill="none"/>
              </svg>
            ) : (
              <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
                <rect x="4" y="1" width="10" height="16" rx="2" stroke="#475569" strokeWidth="1.8" fill="none"/>
              </svg>
            )}
          </button>
          <div style={styles.budgetBadge} onClick={() => setEditBuget(true)}>
            <span style={{ fontSize: 10, color: "#64748b" }}>{t.budget}</span>
            <span style={{ fontWeight: 700, fontSize: 13, color: ramas < 0 ? "#ef4444" : "#0f172a" }}>
              €{bugetTotal.toFixed(0)}
            </span>
          </div>
        </div>
      </div>

      {/* BUDGET BAR */}
      <div style={styles.budgetSection}>
        <div style={styles.budgetRow}>
          <span style={styles.budgetLabel}>{t.spent}: <strong>{formatEUR(totalEUR)}</strong></span>
          <span style={{ ...styles.budgetLabel, color: ramas < 0 ? "#ef4444" : "#10b981" }}>
            {t.remaining}: <strong>{formatEUR(Math.abs(ramas))}{ramas < 0 ? ` ${t.exceeded}` : ""}</strong>
          </span>
        </div>
        <div style={styles.progressBar}>
          <div style={styles.progressFill(progres)} />
        </div>
        {editBuget && (
          <div style={styles.inlineEdit}>
            <input type="number" defaultValue={bugetTotal} autoFocus
              style={styles.inlineInput}
              onBlur={(e) => { setBugetTotal(parseFloat(e.target.value) || bugetTotal); setEditBuget(false); }}
              onKeyDown={(e) => e.key === "Enter" && e.target.blur()}
            />
            <span style={{ fontSize: 12, color: "#64748b" }}>{t.pressEnter}</span>
          </div>
        )}
      </div>

      {/* TABS */}
      <div style={styles.tabs}>
        {[
          { id: "cheltuieli", label: t.expenses },
          { id: "calendar", label: t.planning },
          { id: "statistici", label: t.statistics },
        ].map((t) => (
          <button key={t.id} style={styles.tab(tab === t.id)} onClick={() => setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={styles.content}>
        {tab === "cheltuieli" && (
          <TabCheltuieli
            cheltuieli={filtered} allCheltuieli={cheltuieli}
            filterCat={filterCat} setFilterCat={setFilterCat}
            filterPeriod={filterPeriod} setFilterPeriod={setFilterPeriod}
            totalFiltered={totalFiltered}
            onAdd={() => { setEditItem(emptyBase()); setShowForm(true); }}
            onEdit={(item) => { setEditItem(item); setShowForm(true); }}
            onDelete={deleteItem}
            onVoice={startVoice}
            listening={listening} aiProcessing={aiProcessing}
            transcript={transcript} voiceError={voiceError}
            t={t} CATEGORII={CATEGORII}
          />
        )}
        {tab === "calendar" && (
          <TabCalendar
            cheltuieli={cheltuieli} notite={notite} setNotite={setNotite}
            vacanta={vacanta}
            cheltuieliPeZi={cheltuieliPeZi} totalPeZi={totalPeZi}
            onEditCheltuiala={(item) => { setEditItem(item); setShowForm(true); }}
          />
        )}
        {tab === "statistici" && (
          <TabStatistici
            pieData={pieData} barData={barData}
            filtered={filtered} totalFiltered={totalFiltered}
            filterPeriod={filterPeriod} setFilterPeriod={setFilterPeriod}
            t={t}
          />
        )}
      </div>

      {/* VACANTA EDIT MODAL */}
      {showVacantaEdit && (
        <VacantaEditModal
          vacanta={vacanta}
          onSave={(v) => { setVacanta(v); setBugetTotal(v.buget); setShowVacantaEdit(false); }}
          onClose={() => setShowVacantaEdit(false)}
          onReset={() => { setVacanta(null); setCheltuieli([]); setNotite({}); setBugetTotal(2000); setShowVacantaEdit(false); }}
          t={t}
        />
      )}

      {/* FORM MODAL */}
      {showForm && editItem && (
        <FormModal
          item={editItem} onSave={saveItem}
          onClose={() => { setShowForm(false); setEditItem(null); }}
        />
      )}
    </div>
    </LangContext.Provider>
  );
}

function TabCheltuieli({ cheltuieli, filterCat, setFilterCat, filterPeriod, setFilterPeriod,
  totalFiltered, onAdd, onEdit, onDelete, onVoice, listening, aiProcessing, transcript, voiceError, t, CATEGORII }) {
  return (
    <div>
      <div style={styles.actionRow}>
        <button style={styles.btnPrimary} onClick={onAdd}>{t.add}</button>
        <button style={{ ...styles.btnVoice, ...(listening ? styles.btnVoiceActive : {}) }} onClick={onVoice}>
          {listening ? t.listening : aiProcessing ? t.processing : t.voice}
        </button>
      </div>
      {voiceError && (
        <div style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 10,
          padding: "10px 14px", fontSize: 12, color: "#dc2626", marginBottom: 8, lineHeight: 1.5 }}>
          {voiceError}
        </div>
      )}
      {transcript && <div style={styles.transcriptBubble}>"{transcript}"</div>}

      <div style={styles.filterCol}>
        <select style={styles.select} value={filterCat} onChange={(e) => setFilterCat(e.target.value)}>
          <option value="toate">{t.allCategories}</option>
          {CATEGORII.map((c) => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
        </select>
        <div style={styles.filterDateRow}>
          <div style={styles.dateWrap}>
            <span style={styles.dateWrapLabel}>📅 {t.from}:</span>
            <input type="date" style={styles.dateInput} value={filterPeriod.de_la}
              onChange={(e) => setFilterPeriod((p) => ({ ...p, de_la: e.target.value }))} />
            {filterPeriod.de_la && <button style={styles.dateClear} onClick={() => setFilterPeriod(p=>({...p,de_la:""}))}>✕</button>}
          </div>
          <div style={styles.dateWrap}>
            <span style={styles.dateWrapLabel}>📅 {t.to}:</span>
            <input type="date" style={styles.dateInput} value={filterPeriod.pana_la}
              onChange={(e) => setFilterPeriod((p) => ({ ...p, pana_la: e.target.value }))} />
            {filterPeriod.pana_la && <button style={styles.dateClear} onClick={() => setFilterPeriod(p=>({...p,pana_la:""}))}>✕</button>}
          </div>
        </div>
      </div>

      <div style={styles.totalRow}>
        <span style={styles.totalLabel}>{t.filteredTotal}</span>
        <span style={styles.totalValue}>{formatEUR(totalFiltered)}</span>
      </div>

      {cheltuieli.length === 0 && (
        <div style={styles.emptyState}>
          <div style={{ fontSize: 48 }}>🧳</div>
          <div style={{ color: "#94a3b8", marginTop: 8 }}>{t.noExpenses}</div>
        </div>

      {cheltuieli.map((c) => <CheltuialaCard key={c.id} item={c} onEdit={onEdit} onDelete={onDelete} t={t} CATEGORII={CATEGORII} />)}
    </div>
  );
}

// ── TAB CALENDAR ─────────────────────────────────────────────────────────────
function TabCalendar({ cheltuieli, notite, setNotite, vacanta,
  cheltuieliPeZi, totalPeZi, onEditCheltuiala }) {
  const { t } = useLang();

  // Build full date range: from vacanta.data_plecare to vacanta.data_sosire
  // plus any expense dates outside that range
  const buildAllDates = () => {
    const set = new Set();
    // Add all expense dates
    cheltuieli.forEach((c) => {
      if (c.data) set.add(c.data);
      if (c.extra) {
        const ex = c.extra;
        [ex.checkin_data, ex.checkout_data, ex.pickup_data, ex.dropoff_data].forEach(d => d && set.add(d));
      }
    });
    // Add full range from vacanta
    if (vacanta?.data_plecare) {
      const start = new Date(vacanta.data_plecare);
      const end = vacanta?.data_sosire ? new Date(vacanta.data_sosire) : start;
      let cur = new Date(start);
      while (cur <= end) {
        set.add(cur.toISOString().split("T")[0]);
        cur.setDate(cur.getDate() + 1);
      }
    }
    return [...set].sort();
  };

  const allDates = buildAllDates();

  const DAY_NAMES = t.dayNames;
  const MONTH_NAMES = t.monthNames;

  const formatDateLabel = (d) => {
    const dt = new Date(d + "T12:00:00");
    return `${DAY_NAMES[dt.getDay()]}, ${dt.getDate()} ${MONTH_NAMES[dt.getMonth()]} ${dt.getFullYear()}`;
  };

  const getDayNum = (d) => {
    if (!vacanta?.data_plecare) return null;
    const start = new Date(vacanta.data_plecare + "T12:00:00");
    const cur = new Date(d + "T12:00:00");
    const diff = Math.round((cur - start) / 86400000) + 1;
    return diff > 0 ? diff : null;
  };
  const tLabel = (key, ...args) => t[key] || key;

  // Get special items for a day
  const getSpecialItems = (d) => {
    const items = [];
    cheltuieli.forEach((c) => {
      if (c.categorie === "avion" && c.data === d) {
        items.push({ type: "avion", icon: "✈️", color: "#6366f1", label: c.extra?.nr_zbor ? `Zbor ${c.extra.de_la || ""}→${c.extra.la || ""} · ${c.extra.nr_zbor}` : `Zbor${c.extra?.de_la ? ` ${c.extra.de_la}→${c.extra.la}` : ""}`, sub: c.extra?.ora_plecare ? `Plecare ${c.extra.ora_plecare}${c.extra.terminal_plecare ? ` T${c.extra.terminal_plecare}` : ""} · Sosire ${c.extra.ora_sosire || ""}${c.extra.terminal_sosire ? ` T${c.extra.terminal_sosire}` : ""}` : "", item: c });
      }
      if (c.categorie === "cazare" && c.extra) {
        const tipIcon = { hotel:"🏨", airbnb:"🏠", hostel:"🛏️", homeexchange:"🔄", prieteni:"👥", camping:"⛺", alt:"📍" }[c.extra.tip] || "🏨";
        const locLabel = c.extra.oras || c.extra.nume || "Cazare";
        const costInfo = parseFloat(c.suma) === 0 || !c.suma ? ` · ${t.free}` : "";
        if (c.extra.checkin_data === d) items.push({ type: "checkin", icon: tipIcon, color: "#0ea5e9", label: `${t.checkIn}: ${locLabel}${costInfo}`, sub: `${c.extra.adresa || ""}${c.extra.checkin_ora ? ` · ${c.extra.checkin_ora}` : ""}${c.extra.rezervat_prin ? ` · ${c.extra.rezervat_prin}` : ""}`, item: c });
        if (c.extra.checkout_data === d) items.push({ type: "checkout", icon: tipIcon, color: "#94a3b8", label: `${t.checkOut}: ${locLabel}`, sub: c.extra.checkout_ora ? c.extra.checkout_ora : "", item: c });
        if (c.extra.checkin_data && c.extra.checkout_data && d > c.extra.checkin_data && d < c.extra.checkout_data)
          items.push({ type: "cazare_mid", icon: tipIcon, color: "#0ea5e9", label: `${t.activeAccommodation}: ${locLabel}${costInfo}`, sub: c.extra.adresa || "", item: c });
      }
      if (c.categorie === "masina" && c.extra) {
        if (c.extra.pickup_data === d) items.push({ type: "pickup", icon: "🚗", color: "#10b981", label: `${t.carPickup}: ${c.extra.companie || ""}`, sub: c.extra.pickup_ora || "", item: c });
        if (c.extra.dropoff_data === d) items.push({ type: "dropoff", icon: "🚗", color: "#64748b", label: `${t.carDropoff}: ${c.extra.companie || ""}`, sub: c.extra.dropoff_ora || "", item: c });
        if (c.extra.pickup_data && c.extra.dropoff_data && d > c.extra.pickup_data && d < c.extra.dropoff_data)
          items.push({ type: "masina_mid", icon: "🚗", color: "#10b981", label: `${t.rentalCar}: ${c.extra.companie || ""}`, sub: "", item: c });
      }
    });
    return items;
  };

  // Derive "where are you" for a day from cazare entries
  const getLocationForDay = (d) => {
    const cazari = cheltuieli.filter(c => c.categorie === "cazare" && c.extra);
    // Check if date falls within any stay (checkin inclusive, checkout exclusive)
    for (const c of cazari) {
      const ci = c.extra.checkin_data;
      const co = c.extra.checkout_data;
      if (ci && co && d >= ci && d < co) {
        return c.extra.oras || c.extra.nume || null;
      }
      // Single-day: checkin = checkout or no checkout
      if (ci && !co && d === ci) {
        return c.extra.oras || c.extra.nume || null;
      }
      if (ci && co && d === co) {
        // checkout day — still show as last night location
        return c.extra.oras || c.extra.nume || null;
      }
    }
    return null;
  };

  const isToday = (d) => d === new Date().toISOString().split("T")[0];
  const isPast = (d) => d < new Date().toISOString().split("T")[0];

  if (allDates.length === 0) {
    return (
      <div style={styles.emptyState}>
        <div style={{ fontSize: 48 }}>📅</div>
        <div style={{ color: "#94a3b8", textAlign: "center" }}>
          {t.planningEmpty}
        </div>
      </div>
    );
  }

  return (
    <div style={{ paddingBottom: 20 }}>
      {/* Summary header */}
      <div style={calStyles.summaryBar}>
        <span style={calStyles.summaryItem}>📆 {allDates.length} {t.days}</span>
        <span style={calStyles.summaryItem}>💳 {cheltuieli.length} {t.totalExpenses}</span>
        <span style={calStyles.summaryItem}>💶 {formatEUR(cheltuieli.reduce((s,c)=>s+toEUR(parseFloat(c.suma)||0,c.moneda),0))}</span>
      </div>

      {allDates.map((d) => (
        <DayRow
          key={d}
          date={d}
          dayNum={getDayNum(d)}
          label={formatDateLabel(d)}
          isToday={isToday(d)}
          isPast={isPast(d)}
          location={getLocationForDay(d)}
          specialItems={getSpecialItems(d)}
          cheltuieli={cheltuieliPeZi(d).filter(c => c.categorie !== "avion" && !(c.categorie === "cazare") && !(c.categorie === "masina"))}
          allCheltuieli={cheltuieliPeZi(d)}
          total={totalPeZi(d)}
          nota={notite[d] || ""}
          onNotaChange={(v) => setNotite(n => ({ ...n, [d]: v }))}
          onEditCheltuiala={onEditCheltuiala}
        />
      ))}
    </div>
  );
}

  const [notaVal, setNotaVal] = useState(nota);

  const hasContent = specialItems.length > 0 || allCheltuieli.length > 0 || nota;

  return (

            <div style={calStyles.badgeRow}>

              {allCheltuieli.length > 0 && <span style={calStyles.badge("#6366f1")}>💳 {allCheltuieli.length}</span>}
              {nota && <span style={calStyles.badge("#f59e0b")}>📝</span>}
            </div>
          </div>
        </div>
        {/* Right: total + expand arrow */}
        <div style={calStyles.dayRight}>
          {total > 0 && <div style={calStyles.dayTotal}>{formatEUR(total)}</div>}
          <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>{expanded ? "▲" : "▼"}</div>

      {/* Expanded content */}
      {expanded && (
        <div style={calStyles.dayBody}>

          {specialItems.map((s, i) => (
            <div key={i} style={calStyles.specialItem(s.color)} onClick={() => onEditCheltuiala(s.item)}>

              </div>
              <span style={calStyles.editHint}>✏️</span>
            </div>
          ))}

          {/* Other expenses */}
          {allCheltuieli.filter(c => !["avion","cazare","masina"].includes(c.categorie)).map((c) => {
            const cat = SAFE_CATS.find(x => x.id === c.categorie) || SAFE_CATS[0] || { icon: "💳", label: c.categorie };
            const eur = toEUR(parseFloat(c.suma) || 0, c.moneda);
            const mon = MONEDE.find(m => m.code === c.moneda);
            return (
              <div key={c.id} style={calStyles.expenseItem} onClick={() => onEditCheltuiala(c)}>
                <span style={{ fontSize: 16 }}>{cat.icon}</span>
                <div style={{ flex: 1 }}>
                  <span style={calStyles.expenseCat}>{cat.label}</span>
                  {c.descriere && <span style={calStyles.expenseDesc}> · {c.descriere}</span>}
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={calStyles.expenseAmt}>{formatEUR(eur)}</div>
                  {c.moneda !== "EUR" && <div style={calStyles.expenseOrig}>{mon?.symbol}{c.suma}</div>}
                </div>
              </div>
            );
          })}

          {/* Total bar if has expenses */}
          {allCheltuieli.length > 0 && (
            <div style={calStyles.totalBar}>
              <span style={{ color: "#64748b", fontSize: 12 }}>{t.dailyTotal}</span>
              <span style={{ fontWeight: 800, fontSize: 14, color: "#0f172a" }}>{formatEUR(total)}</span>
            </div>
          )}

          {/* Notes textarea */}
          <div style={calStyles.notesSection}>
            <div style={calStyles.notesLabel}>{t.notesLabel}</div>
            <textarea
              style={calStyles.notesArea}
              value={notaVal}
              placeholder={t.notesPlaceholder}
              onChange={e => setNotaVal(e.target.value)}
              onBlur={() => onNotaChange(notaVal)}
              onClick={e => e.stopPropagation()}
            />
          </div>
        </div>
      )}
    </div>
  );
}

// ── FORM MODAL ────────────────────────────────────────────────────────────────
function FormModal({ item, onSave, onClose, t: tProp, CATEGORII: CATprop }) {
  const { t: tCtx, CATEGORII: CATctx } = useLang();
  const t = tProp || tCtx;
  const CATEGORII = (CATprop && CATprop.length > 0) ? CATprop : (CATctx && CATctx.length > 0 ? CATctx : getCATEGORII(t));
  const [form, setForm] = useState({ ...item });
  const [extra, setExtra] = useState(item.extra || {});
  const cat = CATEGORII.find((c) => c.id === form.categorie) || CATEGORII[0];

  const set = (k, v) => setForm((f) => ({ ...f, [k]: v }));
  const setEx = (k, v) => setExtra((e) => ({ ...e, [k]: v }));

  useEffect(() => {
    if (form.categorie === "avion" && !item.extra) setExtra(emptyAvion());
    else if (form.categorie === "cazare" && !item.extra) setExtra(emptyCazare());
    else if (form.categorie === "masina" && !item.extra) setExtra(emptyCar());
    else if (!["avion", "cazare", "masina"].includes(form.categorie)) setExtra({});
  }, [form.categorie]);

  const handleSave = () => {
    if (!form.suma || !form.data) return;
    onSave({ ...form, extra: Object.keys(extra).length > 0 ? extra : undefined });
  };

  const monedaObj = MONEDE.find((m) => m.code === form.moneda);
  const eurPreview = toEUR(parseFloat(form.suma) || 0, form.moneda);

  return (
    <div style={styles.overlay} onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div style={styles.modal}>
        <div style={styles.modalHeader}>
          <span style={styles.modalTitle}>{cat.icon} {form.id === item.id && !item.suma ? t.newExpense : t.edit}</span>
          <button style={styles.closeBtn} onClick={onClose}>✕</button>
        </div>

        <div style={styles.formBody}>
          {/* Categorie */}
          <div style={styles.catGrid}>
            {CATEGORII.map((c) => (
              <button key={c.id} style={styles.catBtn(form.categorie === c.id, c.color)}
                onClick={() => set("categorie", c.id)}>
                <span style={{ fontSize: 18 }}>{c.icon}</span>
                <span style={{ fontSize: 10, marginTop: 2 }}>{c.label}</span>
              </button>
            ))}
          </div>

          {/* Suma + Moneda */}
          <div style={styles.row}>
            <div style={{ flex: 2 }}>
              <label style={styles.label}>{t.amount}</label>
              <input type="number" style={styles.input} value={form.suma} placeholder="0.00"
                onChange={(e) => set("suma", e.target.value)} />
            </div>
            <div style={{ flex: 2 }}>
              <label style={styles.label}>{t.currency}</label>
              <select style={styles.select} value={form.moneda} onChange={(e) => set("moneda", e.target.value)}>
                {MONEDE.map((m) => <option key={m.code} value={m.code}>{m.code} ({m.symbol}) — {m.name}</option>)}
              </select>
            </div>
          </div>
          {form.moneda !== "EUR" && form.suma && (
            <div style={styles.eurHint}>≈ {formatEUR(eurPreview)} {t.atCurrentRate}</div>
          )}

          {/* Data + Metoda */}
          <div style={styles.row}>
            <div style={{ flex: 1 }}>
              <label style={styles.label}>{t.date}</label>
              <input type="date" style={styles.input} value={form.data}
                onChange={(e) => set("data", e.target.value)} />
            </div>
            <div style={{ flex: 1 }}>
              <label style={styles.label}>{t.paymentMethod}</label>
              <select style={styles.select} value={form.metoda} onChange={(e) => set("metoda", e.target.value)}>
                {METODE_PLATA.map((m) => <option key={m}>{m}</option>)}
              </select>
            </div>
          </div>

          {/* Descriere */}
          <label style={styles.label}>{t.description}</label>
          <input style={styles.input} value={form.descriere} placeholder={t.descriptionPlaceholder}
            onChange={(e) => set("descriere", e.target.value)} />

          {/* AVION EXTRA */}
          {form.categorie === "avion" && (
            <div style={styles.extraSection}>
              <div style={styles.extraTitle}>{t.flightDetails}</div>
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.from}</label>
                  <input style={styles.input} value={extra.de_la || ""} onChange={(e) => setEx("de_la", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.to}</label>
                  <input style={styles.input} value={extra.la || ""} onChange={(e) => setEx("la", e.target.value)} /></div>
              </div>
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.airline}</label>
                  <input style={styles.input} value={extra.companie || ""} onChange={(e) => setEx("companie", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.flightNo}</label>
                  <input style={styles.input} value={extra.nr_zbor || ""} onChange={(e) => setEx("nr_zbor", e.target.value)} /></div>
              </div>
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.departureTime}</label>
                  <input type="time" style={styles.input} value={extra.ora_plecare || ""} onChange={(e) => setEx("ora_plecare", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.departureTerminal}</label>
                  <input style={styles.input} value={extra.terminal_plecare || ""} onChange={(e) => setEx("terminal_plecare", e.target.value)} /></div>
              </div>
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.arrivalTime}</label>
                  <input type="time" style={styles.input} value={extra.ora_sosire || ""} onChange={(e) => setEx("ora_sosire", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.arrivalTerminal}</label>
                  <input style={styles.input} value={extra.terminal_sosire || ""} onChange={(e) => setEx("terminal_sosire", e.target.value)} /></div>
              </div>
              <label style={styles.label}>{t.luggage}</label>
              <input style={styles.input} value={extra.bagaje || ""} placeholder={t.luggagePlaceholder}
                onChange={(e) => setEx("bagaje", e.target.value)} />
            </div>
          )}

          {/* CAZARE EXTRA */}
          {form.categorie === "cazare" && (
            <div style={styles.extraSection}>
              <div style={styles.extraTitle}>{t.accommodationDetails}</div>

              <div style={styles.row}>
                <div style={{ flex: 2 }}>
                  <label style={styles.label}>{t.cityDestination} {t.required}</label>
                  <input style={{ ...styles.input, borderColor: extra.oras ? "#e2e8f0" : "#fbbf24" }}
                    value={extra.oras || ""} placeholder={t.cityPlaceholder}
                    onChange={(e) => setEx("oras", e.target.value)} />
                </div>
                <div style={{ flex: 2 }}>
                  <label style={styles.label}>{t.accommodationType}</label>
                  <select style={styles.select} value={extra.tip || ""} onChange={(e) => setEx("tip", e.target.value)}>
                    <option value="">{t.typeChoose}</option>
                    <option value="hotel">{t.typeHotel}</option>
                    <option value="airbnb">{t.typeAirbnb}</option>
                    <option value="hostel">{t.typeHostel}</option>
                    <option value="homeexchange">{t.typeHomeExchange}</option>
                    <option value="prieteni">{t.typeFriends}</option>
                    <option value="camping">{t.typeCamping}</option>
                    <option value="alt">{t.typeOther}</option>
                  </select>
                </div>
              </div>

              {/* Cost 0 hint */}
              {(parseFloat(form.suma) === 0 || form.suma === "" || form.suma === "0") && (
                <div style={{ background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 8, padding: "8px 12px", fontSize: 12, color: "#15803d", marginBottom: 8 }}>
                  {t.freeAccommodation}
                </div>
              )}

              <label style={styles.label}>{t.hotelName}</label>
              <input style={styles.input} value={extra.nume || ""} placeholder={t.hotelNamePlaceholder}
                onChange={(e) => setEx("nume", e.target.value)} />
              <label style={styles.label}>{t.address}</label>
              <input style={styles.input} value={extra.adresa || ""} onChange={(e) => setEx("adresa", e.target.value)} />
              <label style={styles.label}>{t.bookedVia}</label>
              <input style={styles.input} value={extra.rezervat_prin || ""} placeholder={t.bookedViaPlaceholder}
                onChange={(e) => setEx("rezervat_prin", e.target.value)} />
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.checkInDate}</label>
                  <input type="date" style={styles.input} value={extra.checkin_data || ""} onChange={(e) => setEx("checkin_data", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.checkInTime}</label>
                  <input type="time" style={styles.input} value={extra.checkin_ora || ""} onChange={(e) => setEx("checkin_ora", e.target.value)} /></div>
              </div>
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.checkOutDate}</label>
                  <input type="date" style={styles.input} value={extra.checkout_data || ""} onChange={(e) => setEx("checkout_data", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.checkOutTime}</label>
                  <input type="time" style={styles.input} value={extra.checkout_ora || ""} onChange={(e) => setEx("checkout_ora", e.target.value)} /></div>
              </div>
            </div>
          )}

          {/* MASINA EXTRA */}
          {form.categorie === "masina" && (
            <div style={styles.extraSection}>
              <div style={styles.extraTitle}>{t.carDetails}</div>
              <label style={styles.label}>{t.company}</label>
              <input style={styles.input} value={extra.companie || ""} onChange={(e) => setEx("companie", e.target.value)} />
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.pickupDate}</label>
                  <input type="date" style={styles.input} value={extra.pickup_data || ""} onChange={(e) => setEx("pickup_data", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.pickupTime}</label>
                  <input type="time" style={styles.input} value={extra.pickup_ora || ""} onChange={(e) => setEx("pickup_ora", e.target.value)} /></div>
              </div>
              <div style={styles.row}>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.dropoffDate}</label>
                  <input type="date" style={styles.input} value={extra.dropoff_data || ""} onChange={(e) => setEx("dropoff_data", e.target.value)} /></div>
                <div style={{ flex: 1 }}><label style={styles.label}>{t.dropoffTime}</label>
                  <input type="time" style={styles.input} value={extra.dropoff_ora || ""} onChange={(e) => setEx("dropoff_ora", e.target.value)} /></div>
              </div>
            </div>
          )}

          <button style={styles.btnSave} onClick={handleSave}>{t.save}</button>
        </div>
      </div>
    </div>
  );
}
